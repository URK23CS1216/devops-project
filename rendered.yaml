# Source: devops-demo/templates/secret.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devops-demo-secrets
  labels:
    helm.sh/chart: devops-demo-0.1.0
    app.kubernetes.io/name: devops-demo
    app.kubernetes.io/instance: devops-demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: devops-demo-vault-backend
    kind: SecretStore
  target:
    name: devops-demo-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: "devops-demo"
        property: API_KEY
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "devops-demo"
        property: DB_PASSWORD
---
# Source: devops-demo/templates/secret.yaml
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: devops-demo-vault-backend
  labels:
    helm.sh/chart: devops-demo-0.1.0
    app.kubernetes.io/name: devops-demo
    app.kubernetes.io/instance: devops-demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          key: token
