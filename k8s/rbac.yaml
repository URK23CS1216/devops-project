apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-demo
  namespace: devops-demo
  labels:
    app.kubernetes.io/name: devops-demo
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-demo-role
  namespace: devops-demo
  labels:
    app.kubernetes.io/name: devops-demo
rules:
  # Minimal permissions — read-only access to own configmaps and secrets
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["devops-demo-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-demo-rolebinding
  namespace: devops-demo
  labels:
    app.kubernetes.io/name: devops-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: devops-demo-role
subjects:
  - kind: ServiceAccount
    name: devops-demo
    namespace: devops-demo
