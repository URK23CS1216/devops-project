# Prometheus local config for docker-compose
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yaml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # DevOps Demo Application
  - job_name: 'devops-demo'
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['app:3000']
        labels:
          app: 'devops-demo'
          environment: 'local'
