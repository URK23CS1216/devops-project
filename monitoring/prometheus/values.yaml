# Prometheus Helm chart values for Kubernetes deployment
# Chart: prometheus-community/kube-prometheus-stack

kubePrometheusStack:
  prometheus:
    prometheusSpec:
      scrapeInterval: 15s
      evaluationInterval: 15s
      retention: 15d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      additionalScrapeConfigs:
        - job_name: 'devops-demo'
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - devops-demo
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: 'default'
        routes:
          - match:
              severity: critical
            receiver: 'critical'
            repeat_interval: 1h
      receivers:
        - name: 'default'
          # Configure webhook, email, Slack, etc.
          # webhook_configs:
          #   - url: 'https://your-webhook-url'
        - name: 'critical'
          # webhook_configs:
          #   - url: 'https://your-pagerduty-url'
