# Production environment overrides
replicaCount: 3

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

config:
  NODE_ENV: "production"
  LOG_LEVEL: "warn"

ingress:
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: devops-demo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: devops-demo-tls
      hosts:
        - devops-demo.example.com

networkPolicy:
  enabled: true
