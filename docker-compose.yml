version: '3.8'

services:
  # ========================================
  # Application
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-local}"
        COMMIT_SHA: "${COMMIT_SHA:-dev}"
        IMAGE_TAG: "${IMAGE_TAG:-local}"
    container_name: devops-demo-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devops-net
    restart: unless-stopped

  # ========================================
  # Prometheus — Metrics Collection
  # ========================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: devops-demo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts/rules.yaml:/etc/prometheus/rules.yaml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - devops-net
    restart: unless-stopped

  # ========================================
  # Grafana — Dashboards & Visualization
  # ========================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: devops-demo-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - devops-net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ========================================
  # Loki — Log Aggregation
  # ========================================
  loki:
    image: grafana/loki:2.9.4
    container_name: devops-demo-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - devops-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  devops-net:
    driver: bridge
