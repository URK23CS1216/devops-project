apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-demo
  namespace: argocd
  labels:
    app.kubernetes.io/name: devops-demo
    app.kubernetes.io/part-of: devops-pipeline
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devops-demo
  source:
    # Update this to your actual GitHub repo URL
    repoURL: https://github.com/your-org/devops-demo.git
    targetRevision: main
    path: helm/devops-demo
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
